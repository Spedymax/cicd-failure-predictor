# Fly.io app config. Override `app =` with a globally-unique name before
# first deploy (e.g. `fly apps create cicd-predictor-soko`).

app = "cicd-predictor-soko"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "production"
  APP_LOG_LEVEL = "INFO"
  ML_MODEL_DIR = "/app/data/artifacts/v26_5class"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"
    grace_period = "20s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024

[deploy]
  release_command = ""  # migrations run inside entrypoint, so leave empty
